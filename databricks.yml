

bundle:
  name: my_databricks_project

# Jobs shared across all environments

resources:
  jobs:
    etl_pipeline:
      name: "${bundle.target}-etl-pipeline"
      tasks:
        - task_key: main_notebook
          notebook_task:
            notebook_path: ./notebooks/main.py
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 2


